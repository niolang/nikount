<!doctype html>
<html lang="{{ current_language }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ t("create_new_session") }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css', v=static_version) }}">
</head>
<body>
    <div class="page-shell">
        {% include "home_link.html" %}
        <section class="overview-card">
            <h1>{{ t("create_new_session") }}</h1>
            <p class="muted">{{ t("create_session_intro") }}</p>
        </section>

        <section class="card create-session-card">
            {% if error %}
            <p class="alert alert-error">{{ error }}</p>
            {% endif %}

            <form method="post" action="{{ url_for('new_session') }}">
                <p>
                    <label for="title">{{ t("title") }}</label><br>
                    <input id="title" name="title" type="text" value="{{ title }}" required>
                </p>

                <div class="form-actions">
                    <button type="submit">{{ t("create_session") }}</button>
                </div>
            </form>
        </section>
        {% include "footer.html" %}
    </div>
</body>
</html>
